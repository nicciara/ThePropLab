name: Build Props Summary Cache

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. The 04:15/05:15 runs cover shortly after midnight ET
    # during daylight saving and standard time, followed by the existing daytime runs.
    - cron: "15 4 * * *"
    - cron: "15 5 * * *"
    - cron: "0 13 * * *"
    - cron: "0 16 * * *"
    - cron: "0 19 * * *"
    - cron: "0 21 * * *"

permissions:
  contents: write

jobs:
  build-props-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine current ET date
        run: echo "CACHE_DATE=$(TZ=America/New_York date +%F)" >> "$GITHUB_ENV"

      - name: Build Props summary cache
        run: python scripts/build_props_summary_cache.py --date "$CACHE_DATE"

      - name: Keep only recent Props cache files
        shell: bash
        run: |
          mapfile -t cache_files < <(ls -1 data/cache/props_summary_*.json 2>/dev/null | sort)
          keep_count=5
          if (( ${#cache_files[@]} > keep_count )); then
            remove_count=$(( ${#cache_files[@]} - keep_count ))
            for old_file in "${cache_files[@]:0:remove_count}"; do
              rm -f "$old_file"
            done
          fi

      - name: Commit cache changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u data/cache
          git add -f "data/cache/props_summary_${CACHE_DATE}.json"
          if git diff --cached --quiet; then
            echo "No Props cache changes to commit."
          else
            git commit -m "Update Props summary cache for ${CACHE_DATE}"
            git push
          fi
